# =============================================================================
# SpeedMeter — Ruff Configuration
# =============================================================================

# Maximum line length
line-length = 120

# Target Python version
target-version = "py310"

[lint]
# Rules to enable
#   E  — pycodestyle errors
#   F  — pyflakes (logic errors)
#   I  — isort (import sorting)
#   N  — pep8-naming (naming conventions)
#   W  — pycodestyle warnings
#   D  — pydocstyle (docstring conventions)
select = ["E", "F", "I", "N", "W", "D"]

# Ignore specific rules
ignore = [
    # D100-D107: Docstring linting is too strict for short modules
    "D100", "D101", "D102", "D103", "D104", "D105", "D106", "D107",
    # D200-D299: Docstring formatting rules are often too nitpicky
    "D200", "D201", "D202", "D203", "D204", "D205", "D206", "D207", "D208", "D209",
    "D210", "D211", "D212", "D213", "D214", "D215",
    # D400-D419: Docstring content rules (first line should end with period, etc.)
    "D400", "D401", "D402", "D403", "D404", "D405", "D406", "D407", "D408", "D409",
    "D410", "D411", "D412", "D413", "D414", "D415", "D416", "D417", "D418", "D419",
]

# Directories to exclude
exclude = [
    "venv/",
    "build/",
    "dist/",
    ".git/",
    ".pytest_cache/",
    "__pycache__/",
    "*.egg-info/",
]

[lint.per-file-ignores]
"__init__.py" = ["D", "I", "N"]
"tests/*.py" = ["D", "N"]
